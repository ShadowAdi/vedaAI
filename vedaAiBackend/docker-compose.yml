version: '3.9'

services:
  mongo:
    image: mongo:7
    container_name: veda_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-secret}
      MONGO_INITDB_DATABASE: ${MONGO_DB:-vedaai}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - veda_net
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  redis:
    image: redis:7-alpine
    container_name: veda_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redispass}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - veda_net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
  
  api:
    build:
      context: .
      target: production
    container_name: veda_api
    restart: unless-stopped
    ports:
      - "${PORT:-5000}:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      CLIENT_URL: ${CLIENT_URL:-http://localhost:3000}
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/${MONGO_DB:-vedaai}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      UPLOADTHING_API_KEY: ${UPLOADTHING_API_KEY:-}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./debug:/app/debug
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - veda_net

  worker:
    build:
      context: .
      target: production
    container_name: veda_worker
    restart: unless-stopped
    command: ["node", "dist/workers/worker.js"]
    environment:
      NODE_ENV: production
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-secret}@mongo:27017/${MONGO_DB:-vedaai}?authSource=admin
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379
      UPLOADTHING_API_KEY: ${UPLOADTHING_API_KEY:-}
      UPLOADTHING_TOKEN: ${UPLOADTHING_TOKEN:-}
      SARVAM_API_KEY: ${SARVAM_API_KEY:-}
    volumes:
      - ./logs:/app/logs
      - ./debug:/app/debug
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - veda_net

volumes:
  mongo_data:
  redis_data:
 
networks:
  veda_net:
    driver: bridge

